---
- name: Variables Practice
  hosts: localhost
  gather_facts: false

  vars:
    engineer_name: "Hari Sundar"
    company: "Adobe"
    device_type: "Cisco IOS"
    ntp_server: "10.0.0.1"
    dns_server: "8.8.8.8"

  tasks:
    - name: Display engineer info
      ansible.builtin.debug:
        msg: "Engineer: {{ engineer_name }} targeting {{ company }}"

    - name: Display device config
      ansible.builtin.debug:
        msg: "Device: {{ device_type }} | NTP: {{ ntp_server }} | DNS: {{ dns_server }}"

    - name: Show combined message
      ansible.builtin.debug:
        msg: "{{ engineer_name }} will configure {{ device_type }} at {{ company }}"
 
